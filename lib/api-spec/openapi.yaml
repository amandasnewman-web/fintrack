openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinTrack Multi-Company Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: companies
    description: Company management
  - name: categories
    description: Transaction categories
  - name: transactions
    description: Expenses and deposits
  - name: invoices
    description: Invoice management
  - name: receipts
    description: Receipt management
  - name: reports
    description: Financial reports and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Companies
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # Categories
  /companies/{companyId}/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /companies/{companyId}/categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Transactions
  /companies/{companyId}/transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [expense, deposit]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /companies/{companyId}/transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reports (wow endpoints)
  /companies/{companyId}/reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get financial summary for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportSummary"

  /companies/{companyId}/reports/by-category:
    get:
      operationId: getReportByCategory
      tags: [reports]
      summary: Get transactions grouped by category
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [expense, deposit]
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

  /companies/{companyId}/reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly income/expense totals
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Monthly report data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTotal"

  # Invoices
  /companies/{companyId}/invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, cancelled]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create an invoice
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /companies/{companyId}/invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Receipts
  /companies/{companyId}/receipts:
    get:
      operationId: listReceipts
      tags: [receipts]
      summary: List receipts for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of receipts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Receipt"
    post:
      operationId: createReceipt
      tags: [receipts]
      summary: Create a receipt
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"

  /companies/{companyId}/receipts/{id}:
    get:
      operationId: getReceipt
      tags: [receipts]
      summary: Get a receipt
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
    patch:
      operationId: updateReceipt
      tags: [receipts]
      summary: Update a receipt
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
    delete:
      operationId: deleteReceipt
      tags: [receipts]
      summary: Delete a receipt
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Company:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        taxId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        taxId:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        taxId:
          type: string

    Category:
      type: object
      required: [id, companyId, name, type, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [expense, deposit, both]
        color:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [expense, deposit, both]
        color:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [expense, deposit, both]
        color:
          type: string

    Transaction:
      type: object
      required: [id, companyId, type, amount, date, description, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        type:
          type: string
          enum: [expense, deposit]
        amount:
          type: number
        description:
          type: string
        notes:
          type: ["string", "null"]
        date:
          type: string
          format: date
        referenceNumber:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TransactionInput:
      type: object
      required: [type, amount, date, description]
      properties:
        categoryId:
          type: integer
        type:
          type: string
          enum: [expense, deposit]
        amount:
          type: number
          minimum: 0.01
        description:
          type: string
          minLength: 1
        notes:
          type: string
        date:
          type: string
          format: date
        referenceNumber:
          type: string

    TransactionUpdate:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        type:
          type: string
          enum: [expense, deposit]
        amount:
          type: number
          minimum: 0.01
        description:
          type: string
          minLength: 1
        notes:
          type: string
        date:
          type: string
          format: date
        referenceNumber:
          type: string

    TransactionList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer

    InvoiceLineItem:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number

    Invoice:
      type: object
      required: [id, companyId, invoiceNumber, clientName, issueDate, dueDate, status, lineItems, subtotal, taxRate, taxAmount, total, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        invoiceNumber:
          type: string
        clientName:
          type: string
        clientEmail:
          type: ["string", "null"]
        clientAddress:
          type: ["string", "null"]
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        subtotal:
          type: number
        taxRate:
          type: number
        taxAmount:
          type: number
        total:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    InvoiceInput:
      type: object
      required: [clientName, issueDate, dueDate, lineItems, taxRate]
      properties:
        invoiceNumber:
          type: string
        clientName:
          type: string
          minLength: 1
        clientEmail:
          type: string
        clientAddress:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        taxRate:
          type: number
          minimum: 0
        notes:
          type: string

    InvoiceUpdate:
      type: object
      properties:
        invoiceNumber:
          type: string
        clientName:
          type: string
          minLength: 1
        clientEmail:
          type: string
        clientAddress:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [draft, sent, paid, overdue, cancelled]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        taxRate:
          type: number
          minimum: 0
        notes:
          type: string

    ReceiptLineItem:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number

    Receipt:
      type: object
      required: [id, companyId, receiptNumber, vendorName, date, lineItems, subtotal, taxRate, taxAmount, total, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        receiptNumber:
          type: string
        vendorName:
          type: string
        vendorEmail:
          type: ["string", "null"]
        vendorAddress:
          type: ["string", "null"]
        date:
          type: string
          format: date
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptLineItem"
        subtotal:
          type: number
        taxRate:
          type: number
        taxAmount:
          type: number
        total:
          type: number
        notes:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ReceiptInput:
      type: object
      required: [vendorName, date, lineItems, taxRate]
      properties:
        receiptNumber:
          type: string
        vendorName:
          type: string
          minLength: 1
        vendorEmail:
          type: string
        vendorAddress:
          type: string
        date:
          type: string
          format: date
        categoryId:
          type: integer
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptLineItem"
        taxRate:
          type: number
          minimum: 0
        notes:
          type: string
        paymentMethod:
          type: string

    ReceiptUpdate:
      type: object
      properties:
        receiptNumber:
          type: string
        vendorName:
          type: string
          minLength: 1
        vendorEmail:
          type: string
        vendorAddress:
          type: string
        date:
          type: string
          format: date
        categoryId:
          type: ["integer", "null"]
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptLineItem"
        taxRate:
          type: number
          minimum: 0
        notes:
          type: string
        paymentMethod:
          type: string

    ReportSummary:
      type: object
      required: [totalIncome, totalExpenses, netBalance, transactionCount, startDate, endDate]
      properties:
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netBalance:
          type: number
        transactionCount:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    CategoryBreakdown:
      type: object
      required: [categoryId, categoryName, type, total, count, percentage]
      properties:
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: string
        type:
          type: string
          enum: [expense, deposit]
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number
        color:
          type: ["string", "null"]

    MonthlyTotal:
      type: object
      required: [month, year, totalIncome, totalExpenses, netBalance]
      properties:
        month:
          type: integer
        year:
          type: integer
        totalIncome:
          type: number
        totalExpenses:
          type: number
        netBalance:
          type: number
