name: Build FinTrack

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: artifacts/fintrack-desktop
        run: npm install --legacy-peer-deps

      - name: Build installer
        working-directory: artifacts/fintrack-desktop
        run: node build-standalone.mjs

      - name: Upload FinTrack-Setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: FinTrack-Windows
          path: artifacts/fintrack-desktop/release/FinTrack-Setup.exe
          retention-days: 30
