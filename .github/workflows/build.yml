name: Build FinTrack

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        working-directory: artifacts/fintrack-desktop
        run: npm install
      - name: Build standalone exe
        working-directory: artifacts/fintrack-desktop
        run: node build-standalone.mjs
      - name: Upload FinTrack.exe
        uses: actions/upload-artifact@v4
        with:
          name: FinTrack-Windows
          path: artifacts/fintrack-desktop/release/FinTrack.exe
          retention-days: 30
